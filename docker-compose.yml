services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ventra
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  livekit:
    image: livekit/livekit-server:latest
    restart: always
    command: --config /etc/livekit.yaml --dev
    ports:
      - "7890:7880"
      - "7891:7891"
      - "7892:7882/udp"
      - "50000-50050:50000-50050/udp"
    environment:
      - "LIVEKIT_KEYS=devkey: secret"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml

  redis:
    image: redis:6-alpine
    restart: always

  livekit-sip:
    image: livekit/sip:latest
    restart: always
    environment:
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret
      - REDIS_URL=redis://redis:6379/0
    command: --config /sip/config.yaml
    volumes:
      - ./sip.yaml:/sip/config.yaml
    depends_on:
      - livekit
      - redis

  asterisk:
    image: andrius/asterisk:latest
    restart: always
    ports:
      - "5061:5060/tcp"
      - "5061:5060/udp"
      - "20000-20020:20000-20020/udp"
    volumes:
      - ./asterisk/pjsip.conf:/etc/asterisk/pjsip.conf
      - ./asterisk/pjsip_custom.conf:/etc/asterisk/pjsip_custom.conf
      - ./asterisk/extensions.conf:/etc/asterisk/extensions.conf
      - ./asterisk/extensions_custom.conf:/etc/asterisk/extensions_custom.conf
      - ./asterisk/rtp.conf:/etc/asterisk/rtp.conf

volumes:
  pgdata:
