[global]
type=global

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=10.7.11.141
external_signaling_address=10.7.11.141

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060
external_media_address=10.7.11.141
external_signaling_address=10.7.11.141
external_signaling_port=5061

; Endpoint for LiveKit SIP Gateway
[livekit]
type=endpoint
context=default
disallow=all
allow=ulaw
direct_media=no
aors=livekit
rtp_timeout=0
rtp_timeout_hold=0

[livekit]
type=aor
contact=sip:livekit-sip:5060

[livekit]
type=identify
endpoint=livekit
match=livekit-sip

; --- TEMPLATES ---
[endpoint-template](!)
type=endpoint
context=default
disallow=all
allow=ulaw
rewrite_contact=yes
force_rport=yes
rtp_symmetric=yes
direct_media=no
ice_support=yes
rtp_timeout=0
rtp_timeout_hold=0

[auth-template](!)
type=auth
auth_type=userpass
password=secret

[aor-template](!)
type=aor
max_contacts=1

; --- ENDPOINTS 100 to 110 ---

[100](endpoint-template)
auth=auth100
aors=100
[auth100](auth-template)
username=100
[100](aor-template)

